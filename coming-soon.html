<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon | Jane Homes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brown-dark: #2c1a00;
        --brown-primary: #4a2c00;
        --cream-white: #fdf8f0;
        --cream-light: #f7edd8;
        --gold: #c8954a;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        font-family: "DM Sans", sans-serif;
        color: var(--cream-white);
        background-image:
          linear-gradient(
            120deg,
            rgba(44, 26, 0, 0.82) 0%,
            rgba(44, 26, 0, 0.6) 45%,
            rgba(44, 26, 0, 0.72) 100%
          ),
          url("assets/images/apartment5");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .panel {
        width: min(720px, 100%);
        background: rgba(247, 237, 216, 0.08);
        border: 1px solid rgba(247, 237, 216, 0.24);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px 32px;
        text-align: center;
      }

      .tag {
        display: inline-block;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--cream-light);
        padding: 7px 14px;
        border: 1px solid rgba(247, 237, 216, 0.32);
        border-radius: 999px;
        margin-bottom: 18px;
      }

      h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(40px, 6vw, 62px);
        font-weight: 400;
        line-height: 1.05;
        margin-bottom: 14px;
      }

      p {
        font-size: 16px;
        line-height: 1.75;
        color: rgba(253, 248, 240, 0.9);
        max-width: 580px;
        margin: 0 auto;
      }

      .actions {
        margin-top: 28px;
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .btn {
        text-decoration: none;
        border-radius: 9px;
        padding: 12px 18px;
        font-size: 14px;
        font-weight: 600;
        transition: 0.2s ease;
      }

      .btn-primary {
        background: var(--gold);
        color: var(--brown-dark);
      }

      .btn-primary:hover {
        transform: translateY(-1px);
        opacity: 0.95;
      }

      .btn-ghost {
        border: 1px solid rgba(247, 237, 216, 0.44);
        color: var(--cream-white);
      }

      .btn-ghost:hover {
        background: rgba(247, 237, 216, 0.12);
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="tag">404 • Coming Soon</div>
      <h1>Website Still Under Development</h1>
      <p>
        This page is not live yet. We are currently updating the Jane Homes
        experience and this section will be available soon.
      </p>
      <div class="actions">
        <a href="index.html" class="btn btn-primary">Back to Home</a>
        <a
          href="https://wa.me/2347040761741"
          class="btn btn-ghost"
          target="_blank"
          rel="noopener noreferrer"
          >Contact Us</a
        >
      </div>
    </main>
  </body>
</html>
